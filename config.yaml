data_root: ".."
output_dir: "outputs"
day_count: 365
ann_factor: 252
risk_free_default: 0.34
iv_bounds: [0.001, 5.0]
min_option_price: 1.0
resample_grid_seconds: 60
lob:
  max_files_per_instrument: 8
  cache_dir: "outputs/cache/lob_daily"
  min_q3_pairs: 30
  min_intraday_days: 2
# P3/P4: DV construction and SE clustering for Q2 regressions
regression:
  tick_floor: 1.0        # minimum close price (rial) used as denominator floor
  winsor_lo: 0.01        # lower winsorization percentile for rel_dev within underlying
  winsor_hi: 0.99        # upper winsorization percentile for rel_dev within underlying
  cluster_cols:          # two-way clustering dimensions for SEs
    - "id"
    - "date"
  min_obs: 50            # minimum observations required to fit a regression
canonical_underlyings:
  - "اهرم"
  - "خودرو"
  - "خساپا"
  - "شستا"
  - "وبملت"
  - "وتجارت"
